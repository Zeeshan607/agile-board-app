<script>
  // Applied before first paint (and before any CSS needs it) so switching
  // themes never causes a flash of the wrong one on load.
  (function () {
    try {
      var stored = localStorage.getItem('agileboard-theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {}
  })();
</script>
